include = [
  "../core.toml"
]

[setting.matic_aggregator_address]

[invoke.registerMaticOracleNode]
target = ["system.oracle_manager.Proxy"]
func = "registerNode"
args = [
    # 3 = chainlink aggregator type
    3,
    # 3 parameters are: address of the chainlink oracle
    "<%= defaultAbiCoder.encode(['address', 'uint256', 'uint8'], [settings.matic_aggregator_address, 0, 8]) %>",
    []
]

extra.matic_oracle_id.event = "NodeRegistered"
extra.matic_oracle_id.arg = 0

depends = [
  "provision.system"
]